name: Build & Sign APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以计算版本号

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Unsigned APK
        run: ./gradlew assembleRelease

      - name: Sign APK with apksigner
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_KEY_STORE_PASSWORD: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          # 1. Decode Keystore
          echo $SIGNING_KEY_STORE_BASE64 | base64 --decode > release-key.jks
          
          # 2. Find APK and Sign it
          # apksigner requires zipalign usually, but Gradle's assembleRelease already zipaligned it.
          # We'll sign the generated APK directly.
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          # Note: The output filename logic in build.gradle might include spaces, we handle that with quotes.
          SIGNED_APK_PATH="${APK_PATH%.apk}-signed.apk"
          
          # 3. Perform signing
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release-key.jks \
            --ks-pass pass:$SIGNING_KEY_STORE_PASSWORD \
            --ks-key-alias $SIGNING_KEY_ALIAS \
            --key-pass pass:$SIGNING_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --v4-signing-enabled true \
            --out "$SIGNED_APK_PATH" \
            "$APK_PATH"
          
          # 4. Verify signing
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify --verbose "$SIGNED_APK_PATH"
          
          # 5. Clean up jks
          rm release-key.jks

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Media Provider Manager Signed APK
          path: app/build/outputs/apk/release/*-signed.apk
